<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>גלגל שאלות – מרכז מיטיב</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; direction: rtl; background: #f5f8ff; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .app { background: #fff; border-radius: 20px; box-shadow: 0 4px 24px rgba(26,58,124,0.10); padding: 2rem 2rem 2.5rem; max-width: 680px; width: 100%; }
  .logo-header { display: flex; align-items: center; justify-content: center; padding-bottom: 1.25rem; border-bottom: 1px solid #dde4f0; margin-bottom: 1.75rem; }
  .logo-header img { max-height: 90px; width: auto; }
  .app-title { font-size: 20px; font-weight: 600; color: #1a3a7c; margin-bottom: 4px; text-align: center; }
  .app-sub { font-size: 14px; color: #6b7fa8; margin-bottom: 2rem; text-align: center; }
  .wheel-wrap { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
  .spin-btn { font-size: 16px; font-weight: 600; padding: 13px 48px; border-radius: 999px; border: none; background: #1a3a7c; color: #fff; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .spin-btn:hover { opacity: 0.88; }
  .spin-btn:active { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.4; cursor: default; }
  .result-box { width: 100%; border-radius: 14px; padding: 1.25rem 1.5rem; min-height: 90px; display: flex; flex-direction: column; justify-content: center; border: 1px solid #c2cef0; background: #f4f7ff; transition: background 0.4s, border-color 0.4s; }
  .result-label { font-size: 12px; color: #6b7fa8; margin-bottom: 6px; }
  .result-text { font-size: 17px; color: #1a3a7c; line-height: 1.6; font-weight: 600; }
  .result-cat { font-size: 12px; margin-top: 8px; font-weight: 600; }
  .counter { font-size: 13px; color: #6b7fa8; text-align: center; }
  .history-section { width: 100%; margin-top: 1.75rem; }
  .history-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #dde4f0; padding-bottom: 6px; margin-bottom: 10px; }
  .history-title { font-size: 13px; color: #6b7fa8; }
  .clear-btn { font-size: 12px; color: #9aaac8; background: none; border: none; cursor: pointer; }
  .clear-btn:hover { color: #6b7fa8; }
  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-item { font-size: 13px; padding: 9px 13px; border-radius: 8px; line-height: 1.5; }
  .hi-cat { font-size: 11px; font-weight: 600; margin-bottom: 2px; }
  .pointer { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 20px solid #1a3a7c; z-index: 10; }
  .center-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 18px; height: 18px; border-radius: 50%; background: #fff; border: 2px solid #c2cef0; z-index: 5; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="logo-header">
    <img id="logoImg" alt="מרכז מיטיב – אוניברסיטת רייכמן" />
  </div>
  <div class="app-title">גלגל שאלות לשיח צוותי</div>
  <div class="app-sub">סובבו את הגלגל לשאלה אקראית</div>

  <div class="wheel-wrap">
    <div style="position:relative;display:inline-block;" onclick="spinWheel()">
      <canvas id="wheel" width="460" height="460" style="cursor:pointer;border-radius:50%;display:block;"></canvas>
      <div class="pointer"></div>
      <div class="center-dot"></div>
    </div>
    <button class="spin-btn" id="spinBtn" onclick="spinWheel()">סובב!</button>
    <div class="result-box" id="resultBox">
      <div class="result-label">השאלה שלי היא:</div>
      <div class="result-text" id="resultText" style="color:#9aaac8;">לחצו על הגלגל כדי לקבל שאלה...</div>
      <div class="result-cat" id="resultCat"></div>
    </div>
    <div class="counter" id="counter"></div>
    <div style="margin-top: 0.5rem; padding-top: 0.75rem; border-top: 1px solid #dde4f0; text-align: center; display: flex; flex-direction: column; gap: 4px; width: 100%;">
      <a href="https://www.runi.ac.il/research-institutes/psychology/maytiv" target="_blank" style="font-size: 13px; color: #2a5298; text-decoration: none;">www.runi.ac.il/research-institutes/psychology/maytiv</a>
      <span style="font-size: 13px; color: #6b7fa8;">טלפון: 055-7245064</span>
    </div>
  </div>

  <div class="history-section" id="historySection" style="display:none;">
    <div class="history-header">
      <span class="history-title">שאלות שכבר הסתובבו</span>
      <button class="clear-btn" onclick="clearHistory()">נקה היסטוריה</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<script>
const categories = [
  { name: "פתיחה",         dark: "#1a3a7c", light: "#d6e0f7", textDark: "#0d1f4a", questions: [
    "מה מילה אחת שמתארת לך את התקופה הזו?",
    "מה עוזר לך לקום בבוקר ולהגיע לעבודה בימים האלה?"
  ]},
  { name: "חוויה אישית",   dark: "#2a5298", light: "#dce8f8", textDark: "#152a55", questions: [
    "איפה אתה מרגיש את המלחמה הכי חזק – בבית, בעבודה, בראש?",
    "מה הכי קשה לך להשאיר בחוץ כשאתה נכנס לעבודה?",
    "יש רגע מהתקופה הזו שנשאר איתך – לטוב או לרע?"
  ]},
  { name: "גוף",            dark: "#7aab00", light: "#eef6d0", textDark: "#3d5c00", questions: [
    "איך הגוף שלך מגיב לתקופה – שינה, אכילה, עייפות, מתח?",
    "יש תחושה גופנית שחוזרת אצלך – כבדות, חוסר שקט, קיפאון?",
    "מה אתה עושה כדי לטפל בעצמך – גם אם זה משהו קטן?"
  ]},
  { name: "נפש",            dark: "#3a5fbf", light: "#e2e9f9", textDark: "#1c3070", questions: [
    "יש רגש שקשה לך להרשות לעצמך להרגיש בתקופה הזו?",
    "מה עוזר לך רגשית – מוזיקה, אנשים, תנועה, שקט?",
    "מה השתנה אצלך בפנים – במה שחשוב לך?",
    "מה אתה עושה עם הפחד, החרדה או העצב שעולים?"
  ]},
  { name: "משפחה",          dark: "#1a3a7c", light: "#d6e0f7", textDark: "#0d1f4a", questions: [
    "איך המלחמה נמצאת בבית שלך – על מה מדברים, על מה לא?",
    "יש מישהו בבית שאתה דואג לו במיוחד? איך זה משפיע עליך?",
    "קרה לך שהיית צריך להיות חזק בבית וגם בעבודה באותו יום?",
    "מה המשפחה נותנת לך עכשיו – ומה היית רוצה שתיתן?"
  ]},
  { name: "עבודה ותפקוד",  dark: "#7aab00", light: "#eef6d0", textDark: "#3d5c00", questions: [
    "מה השתנה בדרך שאתה עובד מאז תחילת המלחמה?",
    "איך אתה מתמודד עם ריכוז, קבלת החלטות, עומס?",
    "יש משהו בעבודה שמרגיש משמעותי יותר? משהו שאיבד משמעות?"
  ]},
  { name: "צוות",           dark: "#2a5298", light: "#dce8f8", textDark: "#152a55", questions: [
    "מה אתה צריך מהצוות הזה שאתה לא מקבל מספיק?",
    "מה אתה יכול לתת לעמיתים שלך עכשיו – גם אם זה קטן?",
    "מה גרם לך להרגיש שאתה לא לבד בתקופה הזו?"
  ]},
  { name: "סיום",           dark: "#3a5fbf", light: "#e2e9f9", textDark: "#1c3070", questions: [
    "מה גרם לך לגאווה בעצמך בתקופה הזו?",
    "מה היית רוצה להגיד לעצמך בסוף המפגש הזה?",
    "מה אתה לוקח מהמפגש הזה הביתה?"
  ]}
];

// Flatten all questions with their category, assign slice per question
const allQuestions = [];
categories.forEach(cat => cat.questions.forEach(q => allQuestions.push({ q, cat })));
const totalQ = allQuestions.length;
const sliceAngle = (2 * Math.PI) / totalQ;

let currentAngle = 0, spinning = false, usedIndices = [], history = [];

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const CX = canvas.width / 2, CY = canvas.height / 2, R = 225;

function wrapText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (let i = 0; i < words.length; i++) {
    const test = line + (line ? ' ' : '') + words[i];
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = words[i];
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function drawWheel(rotation) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < totalQ; i++) {
    const item = allQuestions[i];
    const cat = item.cat;
    const sliceMid = rotation + i * sliceAngle - Math.PI / 2 + sliceAngle / 2;
    const start = rotation + i * sliceAngle - Math.PI / 2;
    const end = start + sliceAngle;

    const catQIdx = cat.questions.indexOf(item.q);
    const fill = catQIdx % 2 === 0 ? cat.dark : cat.light;
    const textColor = catQIdx % 2 === 0 ? '#ffffff' : cat.textDark;

    // Draw slice
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, end);
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Draw ordinal number, tangentially, from outer edge inward
    const innerR = 28, outerR = R - 8;
    const midR = (innerR + outerR) / 2;

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(sliceMid);
    ctx.translate(midR, 0);
    ctx.rotate(-Math.PI / 2);

    ctx.font = 'bold 13px Segoe UI, Arial, sans-serif';
    ctx.fillStyle = textColor;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(i + 1), 0, 0);

    ctx.restore();
  }

  // Center circle
  ctx.beginPath();
  ctx.arc(CX, CY, 18, 0, 2 * Math.PI);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.strokeStyle = '#c2cef0';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function getRandomUnused() {
  if (usedIndices.length >= totalQ) usedIndices = [];
  const available = allQuestions.map((_,i) => i).filter(i => !usedIndices.includes(i));
  return available[Math.floor(Math.random() * available.length)];
}

function spinWheel() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  const box = document.getElementById('resultBox');
  box.style.background = '#f4f7ff';
  box.style.borderColor = '#c2cef0';
  document.getElementById('resultText').style.color = '#9aaac8';
  document.getElementById('resultText').textContent = 'מסתובב...';
  document.getElementById('resultCat').textContent = '';

  const idx = getRandomUnused();
  // target: slice idx points to top (under pointer at -PI/2)
  const targetAngle = -(idx * sliceAngle + sliceAngle / 2);
  const spins = 4 + Math.random() * 3;
  const totalRot = spins * 2 * Math.PI + targetAngle - (currentAngle % (2 * Math.PI));
  const duration = 3200, startTime = performance.now(), startAngle = currentAngle;

  function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
  function animate(now) {
    const t = Math.min((now - startTime) / duration, 1);
    currentAngle = startAngle + totalRot * ease(t);
    drawWheel(currentAngle);
    if (t < 1) { requestAnimationFrame(animate); return; }
    spinning = false;
    document.getElementById('spinBtn').disabled = false;
    usedIndices.push(idx);
    const item = allQuestions[idx];
    const cat = item.cat;
    box.style.background = cat.light;
    box.style.borderColor = cat.dark + '55';
    document.getElementById('resultText').style.color = cat.textDark;
    document.getElementById('resultText').textContent = item.q;
    document.getElementById('resultCat').textContent = cat.name;
    document.getElementById('resultCat').style.color = cat.dark;
    document.getElementById('counter').textContent = 'שאלות שנשאלו: ' + usedIndices.length + ' / ' + totalQ;
    addToHistory(item);
  }
  requestAnimationFrame(animate);
}

function addToHistory(item) {
  history.unshift(item);
  if (history.length > 10) history.pop();
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  section.style.display = 'block';
  list.innerHTML = '';
  history.forEach(h => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.style.background = h.cat.light;
    div.style.color = h.cat.textDark;
    div.innerHTML = '<div class="hi-cat" style="color:' + h.cat.dark + '">' + h.cat.name + '</div>' + h.q;
    list.appendChild(div);
  });
}

function clearHistory() {
  history = []; usedIndices = [];
  document.getElementById('historySection').style.display = 'none';
  document.getElementById('counter').textContent = '';
  const box = document.getElementById('resultBox');
  box.style.background = '#f4f7ff'; box.style.borderColor = '#c2cef0';
  document.getElementById('resultText').textContent = 'לחצו על הגלגל כדי לקבל שאלה...';
  document.getElementById('resultText').style.color = '#9aaac8';
  document.getElementById('resultCat').textContent = '';
}
